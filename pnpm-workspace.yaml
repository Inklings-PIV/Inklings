allowBuilds:
  '@vaadin/vaadin-usage-statistics': false  # deck.gl telemetry, harmless to skip
  esbuild: true                              # native binary; needed by tsx / vitest / drizzle-kit
  protobufjs: false                          # opentelemetry, harmless to skip
  sharp: true                                # native binary; needed by Next.js image optimisation

ignoredBuiltDependencies:
  - unrs-resolver

overrides:
  esbuild: '>=0.25.0'
  postcss: '>=8.5.10'
